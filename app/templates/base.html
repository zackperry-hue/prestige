<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Prestige{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            800: '#1a1f3a',
                            900: '#0f1225',
                            950: '#0a0d1a',
                        },
                        strava: '#fc4c02',
                        whoop: '#00b8b0',
                        wahoo: '#2563eb',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="h-full bg-navy-950 text-gray-100">
    {% if user %}
    <nav class="bg-navy-900 border-b border-gray-800">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/dashboard/ui" class="flex items-center space-x-2.5">
                    <svg class="w-8 h-4" viewBox="0 0 100 50" fill="white">
                        <path d="M22 4c-11 0-18 7-18 16s7 14 16 14c5 0 9-2 12-5l2-2 2 2c3 3 7 5 12 5 9 0 16-6 16-14 0-3-1-5-2-7-2-3-5-5-8-6h-1c-2-1-3-1-5-1-5 0-9 2-12 5l-2 2-2-2c-3-3-7-5-12-5zm0 8c4 0 7 2 9 5l1 2-1 2c-2 3-5 5-9 5-5 0-9-3-9-8s4-6 9-6zm26 0c5 0 9 2 9 6 0 5-4 8-9 8-4 0-7-2-9-5l-1-2 1-2c2-3 5-5 9-5z"/>
                        <path d="M52 21c-9 0-16 6-16 14 0 3 1 5 2 7 2 3 5 5 8 6h1c2 1 3 1 5 1 5 0 9-2 12-5l2-2 2 2c3 3 7 5 12 5 11 0 18-7 18-16S89 18 80 18c-5 0-9 2-12 5l-2 2-2-2c-3-3-7-5-12-5zm0 8c4 0 7 2 9 5l1 2-1 2c-2 3-5 5-9 5-5 0-9-3-9-8 0-4 4-6 9-6zm26 0c5 0 9 2 9 6 0 5-4 8-9 8-4 0-7-2-9-5l-1-2 1-2c2-3 5-5 9-5z"/>
                    </svg>
                    <span class="text-lg font-bold text-white tracking-tight">Prestige</span>
                </a>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-400">{{ user.email }}</span>
                    <a href="/dashboard/ui/logout"
                       class="text-sm text-gray-400 hover:text-white transition-colors">
                        Sign out
                    </a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
