{% extends "base.html" %}

{% block title %}{{ title }} - Prestige{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center fade-in max-w-md">
        <div class="text-6xl font-bold text-gray-600 mb-4">{{ status_code }}</div>
        <h1 class="text-2xl font-semibold text-white mb-3">{{ title }}</h1>
        <p class="text-gray-400 mb-8">{{ message }}</p>
        <div class="flex items-center justify-center space-x-4">
            {% if status_code == 401 %}
            <a href="/"
               class="px-6 py-3 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-medium transition-colors">
                Sign In
            </a>
            {% else %}
            <a href="/dashboard/ui"
               class="px-6 py-3 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-medium transition-colors">
                Go to Dashboard
            </a>
            <a href="/"
               class="px-6 py-3 rounded-lg bg-navy-900 hover:bg-navy-800 text-gray-300 font-medium transition-colors border border-gray-700">
                Home
            </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
