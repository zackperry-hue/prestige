{% extends "base.html" %}

{% block title %}Sign In - Prestige{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <svg class="w-16 h-8 mx-auto" viewBox="0 0 100 50" fill="white">
                <path d="M22 4c-11 0-18 7-18 16s7 14 16 14c5 0 9-2 12-5l2-2 2 2c3 3 7 5 12 5 9 0 16-6 16-14 0-3-1-5-2-7-2-3-5-5-8-6h-1c-2-1-3-1-5-1-5 0-9 2-12 5l-2 2-2-2c-3-3-7-5-12-5zm0 8c4 0 7 2 9 5l1 2-1 2c-2 3-5 5-9 5-5 0-9-3-9-8s4-6 9-6zm26 0c5 0 9 2 9 6 0 5-4 8-9 8-4 0-7-2-9-5l-1-2 1-2c2-3 5-5 9-5z"/>
                <path d="M52 21c-9 0-16 6-16 14 0 3 1 5 2 7 2 3 5 5 8 6h1c2 1 3 1 5 1 5 0 9-2 12-5l2-2 2 2c3 3 7 5 12 5 11 0 18-7 18-16S89 18 80 18c-5 0-9 2-12 5l-2 2-2-2c-3-3-7-5-12-5zm0 8c4 0 7 2 9 5l1 2-1 2c-2 3-5 5-9 5-5 0-9-3-9-8 0-4 4-6 9-6zm26 0c5 0 9 2 9 6 0 5-4 8-9 8-4 0-7-2-9-5l-1-2 1-2c2-3 5-5 9-5z"/>
            </svg>
            <h1 class="mt-4 text-3xl font-bold text-white">Prestige</h1>
            <p class="mt-2 text-gray-400">Track workouts across all your platforms</p>
        </div>

        <div class="bg-navy-900 rounded-2xl p-8 shadow-xl border border-gray-800">
            <!-- Tab toggle -->
            <div class="flex rounded-lg bg-navy-950 p-1 mb-6">
                <button id="tab-login" onclick="switchTab('login')"
                        class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all
                               bg-navy-800 text-white shadow">
                    Sign In
                </button>
                <button id="tab-register" onclick="switchTab('register')"
                        class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all
                               text-gray-400 hover:text-white">
                    Register
                </button>
            </div>

            {% if error %}
            <div class="mb-4 p-3 rounded-lg bg-red-900/40 border border-red-700 text-red-300 text-sm">
                {{ error }}
            </div>
            {% endif %}

            {% if success %}
            <div class="mb-4 p-3 rounded-lg bg-green-900/40 border border-green-700 text-green-300 text-sm">
                {{ success }}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form id="form-login" method="POST" action="/dashboard/ui/login" class="space-y-4">
                <div>
                    <label for="login-email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                    <input type="email" id="login-email" name="email" required
                           class="w-full px-4 py-3 rounded-lg bg-navy-950 border border-gray-700
                                  text-white placeholder-gray-500 focus:outline-none focus:ring-2
                                  focus:ring-blue-500 focus:border-transparent transition-all"
                           placeholder="you@example.com">
                </div>
                <div>
                    <label for="login-password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <input type="password" id="login-password" name="password" required
                           class="w-full px-4 py-3 rounded-lg bg-navy-950 border border-gray-700
                                  text-white placeholder-gray-500 focus:outline-none focus:ring-2
                                  focus:ring-blue-500 focus:border-transparent transition-all"
                           placeholder="Enter your password">
                </div>
                <button type="submit"
                        class="w-full py-3 px-4 rounded-lg bg-blue-600 hover:bg-blue-500
                               text-white font-medium transition-colors">
                    Sign In
                </button>
            </form>

            <!-- Register Form (hidden by default) -->
            <form id="form-register" method="POST" action="/dashboard/ui/register" class="space-y-4 hidden">
                <div>
                    <label for="reg-email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                    <input type="email" id="reg-email" name="email" required
                           class="w-full px-4 py-3 rounded-lg bg-navy-950 border border-gray-700
                                  text-white placeholder-gray-500 focus:outline-none focus:ring-2
                                  focus:ring-blue-500 focus:border-transparent transition-all"
                           placeholder="you@example.com">
                </div>
                <div>
                    <label for="reg-password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <input type="password" id="reg-password" name="password" required minlength="8"
                           class="w-full px-4 py-3 rounded-lg bg-navy-950 border border-gray-700
                                  text-white placeholder-gray-500 focus:outline-none focus:ring-2
                                  focus:ring-blue-500 focus:border-transparent transition-all"
                           placeholder="At least 8 characters">
                </div>
                <div>
                    <label for="reg-name" class="block text-sm font-medium text-gray-300 mb-1">Display Name <span class="text-gray-500">(optional)</span></label>
                    <input type="text" id="reg-name" name="display_name"
                           class="w-full px-4 py-3 rounded-lg bg-navy-950 border border-gray-700
                                  text-white placeholder-gray-500 focus:outline-none focus:ring-2
                                  focus:ring-blue-500 focus:border-transparent transition-all"
                           placeholder="Your name">
                </div>
                <button type="submit"
                        class="w-full py-3 px-4 rounded-lg bg-blue-600 hover:bg-blue-500
                               text-white font-medium transition-colors">
                    Create Account
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function switchTab(tab) {
        const loginForm = document.getElementById('form-login');
        const registerForm = document.getElementById('form-register');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');

        if (tab === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            tabLogin.className = tabLogin.className.replace('text-gray-400 hover:text-white', 'bg-navy-800 text-white shadow');
            tabLogin.classList.add('bg-navy-800', 'text-white', 'shadow');
            tabRegister.classList.remove('bg-navy-800', 'text-white', 'shadow');
            tabRegister.className = tabRegister.className.replace('bg-navy-800 text-white shadow', '');
            tabRegister.classList.add('text-gray-400');
        } else {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            tabRegister.classList.add('bg-navy-800', 'text-white', 'shadow');
            tabRegister.classList.remove('text-gray-400');
            tabLogin.classList.remove('bg-navy-800', 'text-white', 'shadow');
            tabLogin.classList.add('text-gray-400');
        }
    }

    {% if mode == 'register' %}
    switchTab('register');
    {% endif %}
</script>
{% endblock %}
